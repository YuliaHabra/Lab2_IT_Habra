# Цей файл описує CI/CD pipeline для проєкту на Vue 3 з використанням Pinia, TypeScript та Vitest.
name: CI/CD Pipeline

# Запускаємо pipeline при пуші в гілки main та develop, а також при створенні pull request до цих гілок.
on: 
  push:
  # Вказуємо гілки, при пуші в які буде запускатися pipeline
    branches: 
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Визначаємо роботу, яка буде виконуватися в рамках цього pipeline
jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    
    # Вказуємо папку, де лежить наш проєкт (і файл package.json)
    defaults:
      run:
        working-directory: ./vue-3-todo-app-pina-ts-vitest

# Вказуємо послідовність кроків, які потрібно виконати для побудови та тестування проєкту
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit